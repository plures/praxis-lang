name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-test:
    name: build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Build
        run: cargo build --workspace --all-targets
      - name: Test
        run: cargo test --workspace

  verify-grammar:
    name: verify-grammar (placeholder)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Verify grammar is regenerated from px-ast (drift gate)
        # Real regenerate-and-diff gate (epic M3, ADR-0021 / C-DRIFT-001):
        # grammar.pest is a GENERATED artifact. Regenerate it from px-ast via
        # px-grammar-gen and fail if the committed grammar drifts from output.
        run: |
          cargo run -q -p px-grammar-gen > /tmp/px.grammar.gen.pest
          if ! diff -u crates/px-grammar/src/grammar.pest /tmp/px.grammar.gen.pest; then
            echo "::error::grammar.pest is stale — regenerate with: cargo run -p px-grammar-gen > crates/px-grammar/src/grammar.pest"
            exit 1
          fi
          echo "grammar.pest matches px-grammar-gen output (no drift)."

  verify-schema:
    name: verify-schema (placeholder)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Verify schema is a current projection of px-ast (drift gate)
        # PLACEHOLDER (epic M1): becomes a real regenerate-and-diff gate in M4.
        # It will regenerate schema/px.schema.json (+ px.schema.px) from px-ast
        # via schemars and fail if the committed schema differs (C-DRIFT-001).
        # For now it just asserts the schema crate builds.
        run: cargo build -p px-schema -p px-schema-derive
