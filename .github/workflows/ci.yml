name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  no-bom:
    name: no UTF-8 BOM in Cargo.toml
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for BOM in Cargo.toml manifests
        run: bash scripts/check-no-bom.sh

  build-test:
    name: build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Build
        run: cargo build --workspace --all-targets
      - name: Test
        run: cargo test --workspace

  verify-grammar:
    name: verify-grammar (placeholder)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Verify grammar is regenerated from px-ast (drift gate)
        # Real regenerate-and-diff gate (epic M3, ADR-0021 / C-DRIFT-001):
        # grammar.pest is a GENERATED artifact. Regenerate it from px-ast via
        # px-grammar-gen and fail if the committed grammar drifts from output.
        run: |
          cargo run -q -p px-grammar-gen > /tmp/px.grammar.gen.pest
          if ! diff -u crates/px-grammar/src/grammar.pest /tmp/px.grammar.gen.pest; then
            echo "::error::grammar.pest is stale — regenerate with: cargo run -p px-grammar-gen > crates/px-grammar/src/grammar.pest"
            exit 1
          fi
          echo "grammar.pest matches px-grammar-gen output (no drift)."

  verify-schema:
    name: verify-schema (placeholder)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Verify schema is a current projection of px-ast (drift gate)
        # Real regenerate-and-diff gate (epic M4, ADR §M4 / C-DRIFT-001):
        # schema/px.schema.json and schema/px.schema.px are GENERATED projections
        # of px-ast (via schemars). Regenerate them into a temp dir and fail if
        # the committed artifacts drift from the freshly generated output.
        # (Job display name kept identical so branch protection stays satisfied.)
        run: |
          gen="$(mktemp -d)"
          cargo run -q -p px-schema -- "$gen"
          fail=0
          for f in px.schema.json px.schema.px; do
            if ! diff -u "schema/$f" "$gen/$f"; then
              echo "::error::schema/$f is stale — regenerate with: cargo run -p px-schema -- schema (or scripts/regen-schema.ps1)"
              fail=1
            fi
          done
          if [ "$fail" -ne 0 ]; then exit 1; fi
          echo "schema/px.schema.json and schema/px.schema.px match px-schema output (no drift)."
