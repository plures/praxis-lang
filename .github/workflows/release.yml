name: release

# Release path for praxis-lang.
#
# The .px schema "auto-updates with every release" (ADR §M4, C-DRIFT-001) via a
# STRUCTURAL guarantee, not a manual step: on every release tag we regenerate
# the generated artifacts (schema/px.schema.json, schema/px.schema.px, and
# grammar.pest) from px-ast and FAIL the release if the committed artifacts drift
# from the freshly generated output. A release therefore cannot ship a schema
# that lags the AST — the gate blocks it.
#
# HONEST SCOPE (epic M4): crate versions are 0.0.0 and NAPI publish wiring is
# scheduled for M5 (see docs/epic/PRAXIS-LANG-TRACKER.md), so this workflow does
# NOT fake a crates.io / npm publish. The `publish` job below is intentionally a
# documented, non-executing placeholder that will be filled in M5. What IS real
# and enforced today is the regenerate-artifacts-and-block-on-drift gate.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # REAL, ENFORCED: regenerate every generated artifact from px-ast and block
  # the release if the committed copy drifts. This is the mechanism behind
  # "schema that auto-updates with every release".
  regenerate-artifacts:
    name: regenerate generated artifacts (schema + grammar) from px-ast
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Regenerate schema from px-ast (drift gate)
        run: |
          gen="$(mktemp -d)"
          cargo run -q -p px-schema -- "$gen"
          fail=0
          for f in px.schema.json px.schema.px; do
            if ! diff -u "schema/$f" "$gen/$f"; then
              echo "::error::RELEASE BLOCKED: schema/$f is stale. Run scripts/regen-schema.ps1 and commit before tagging a release."
              fail=1
            fi
          done
          if [ "$fail" -ne 0 ]; then exit 1; fi
          echo "schema artifacts are a current projection of px-ast."

      - name: Regenerate grammar from px-ast (drift gate)
        run: |
          cargo run -q -p px-grammar-gen > /tmp/px.grammar.gen.pest
          if ! diff -u crates/px-grammar/src/grammar.pest /tmp/px.grammar.gen.pest; then
            echo "::error::RELEASE BLOCKED: grammar.pest is stale. Run scripts/regen-grammar.ps1 and commit before tagging a release."
            exit 1
          fi
          echo "grammar.pest is a current projection of px-ast."

  # Full workspace validation must also pass before any release proceeds.
  verify:
    name: verify (fmt + clippy + build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Build
        run: cargo build --workspace --all-targets
      - name: Test
        run: cargo test --workspace

  # HONEST PLACEHOLDER (epic M5 follow-up — NOT a fake publish):
  # crate versions are 0.0.0 and the NAPI-RS build/publish wiring is scheduled
  # for M5. This job gates on the real drift + verify jobs and, for now, only
  # asserts the release artifacts are present. It deliberately does NOT run
  # `cargo publish` / `npm publish` — that lands in M5. See
  # docs/epic/PRAXIS-LANG-TRACKER.md.
  publish:
    name: publish (M5 follow-up — placeholder, no fake publish)
    needs: [regenerate-artifacts, verify]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Confirm generated artifacts are committed (release prerequisite)
        run: |
          test -f schema/px.schema.json
          test -f schema/px.schema.px
          test -f crates/px-grammar/src/grammar.pest
          echo "Generated artifacts present and drift-gated."
      - name: Publish step (deferred to M5)
        run: |
          echo "Crate/NAPI publish is deferred to epic M5 (versions are 0.0.0)."
          echo "This job intentionally performs NO publish. See docs/epic/PRAXIS-LANG-TRACKER.md."
